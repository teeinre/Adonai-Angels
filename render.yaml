services:
  - type: web
    name: adonai-ngo-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SUPABASE_URL
        value: placeholder-url-change-me
      - key: VITE_SUPABASE_ANON_KEY
        value: placeholder-anon-key-change-me
      - key: VITE_SUPABASE_SERVICE_ROLE_KEY
        value: placeholder-service-role-key-change-me
      - key: NODE_VERSION
        value: 18.0.0
    routes:
      - type: rewrite
        source: /(.*)
        destination: /index.html
    # Health check is implicitly handled for static sites by Render
    # by verifying the build completes and assets are servable.
